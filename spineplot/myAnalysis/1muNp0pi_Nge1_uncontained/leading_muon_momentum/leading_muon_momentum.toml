[[this_includes]]
file = '../configurations/common/variables_uncontained.toml'

[[this_includes]]
file = '../configurations/common/styles.toml'

# SIMULATION SAMPLE
[samples]
[samples.mc]
#key = "nominal"
key = "full"
exposure_type = "pot"
trees = ['selected']
print_sys = false
# Comment this to avoid systematics when plotting (usually done for testing plots)
systematics = ['multisimTree','multisigmaTree','selected_NuMIfluxsimTree']

# DATA SAMPLE
[samples.onbeam]
key = "onbeam"
exposure_type = "pot"
override_category = -100
trees = ['selected']

[output]
path = '/Users/rvizarreta/Library/CloudStorage/GoogleDrive-rvizarreta14@gmail.com/My Drive/🏛 PhD Repository/🚀 Research/🤖 Experiments&Projects/ICARUS/ICARUS_CC0pi_Selection/ICARUS-NuMI-CC0pi-Selection/spineplot/myAnalysis/1muNp0pi_Nge1_uncontained/leading_muon_momentum'

[[systematic_recipe]]
name = 'stats'
label = 'Stat.'
pattern = 'mc_statistical'

[[systematic_recipe]]
name = 'flux'
label = 'Flux'
pattern = '\b\w*_Flux\b'

[[systematic_recipe]]
name = 'xsec'
label = 'Cross-section'
pattern = '\bGENIEReWeight_SBN_v1_multisim_\w+\b'

[[systematic_recipe]]
name = 'MC_total'
label = 'Flux & Interaction Uncertainty'
pattern = '^(flux|xsec|stats)$'

[analysis]
#ordinate_sample = 'mc'
ordinate_sample = 'onbeam'
category_branch = 'true_category'
category_assignment = [[0,3], [1,4], [6,7,8], [9], [2,5], [10], [-100]]
category_labels = ['Signal', 'Signal QE', 'Other CC', '$\nu$ NC', 'OOFV', 'Cosmic', 'Data']
category_colors = ['darkgreen', 'darkgreen','C1', 'C3','C5', 'C4', 'C6', 'black']
category_types = ['histogram', 'histogram', 'histogram', 'histogram','histogram','histogram', 'scatter']

[[figure]]
name = 'leading_muon_momentum_reco'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra1D'
variable = 'reco_leading_muon_momentum'
draw_kwargs = {'show_component_number' = true, 'show_component_percentage' = true, 'invert_stack_order' = true, 'normalize' = true, 'draw_error' = 'MC_total', 'draw_ratio'='True'}

[[figure]]
name = 'leading_muon_momentum_fractional_residual'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra2D'
yvariable = 'reco_leading_muon_momentum_residual'
xvariable = 'true_leading_muon_momentum_residual'
xrange = [-2,2]
xtitle = '$\frac{p_{\mu,\mathrm{reco}} - p_{\mu,\mathrm{true}}}{p_{\mu,\mathrm{true}}}$'
draw_kwargs = {'show_option' = 'projection', 'draw_identity' = true, 'draw_colorbar' = true, 'logz' = true}

[[figure]]
name = 'leading_muon_momentum_2d_correlation'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra2D'
xvariable = 'true_leading_muon_momentum'
yvariable = 'reco_leading_muon_momentum'
draw_kwargs = {'show_option' = '2d', 'draw_identity' = true, 'draw_colorbar' = true, 'logz' = true}

[[figure]]
name = 'leading_muon_momentum_smearing_matrix_normalized'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra2D'
xvariable = 'true_leading_muon_momentum_smearing'
yvariable = 'reco_leading_muon_momentum_smearing'
draw_kwargs = {show_option = 'smearing', draw_colorbar = true}

[[figure]]
name = "systematics_dpT"
type = "SimpleFigure"
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = "SpineSpectra1D"
variable = "reco_leading_muon_momentum"
yrange = [0.0, 0.45]
[figure.artists.draw_kwargs]
method = "draw_systematics"
systematic_names = ["flux", "xsec", "stats"]
fractional = true
show_total = true      # This will show MC_total (sum of all components)
show_individual = true # This shows flux, xsec, stats separately