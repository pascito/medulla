[[this_includes]]
file = '../configurations/common/variables_contained.toml'

[[this_includes]]
file = '../configurations/common/styles.toml'

# SIMULATION SAMPLE
[samples]
[samples.mc]
key = "nominal"
exposure_type = "pot"
trees = ['selected']

# DATA SAMPLE
[samples.onbeam]
key = "onbeam"
exposure_type = "pot"
override_category = -100
trees = ['selected']

[output]
path = '/Users/rvizarreta/Library/CloudStorage/GoogleDrive-rvizarreta14@gmail.com/My Drive/🏛 PhD Repository/🚀 Research/🤖 Experiments&Projects/ICARUS/ICARUS_CC0pi_Selection/ICARUS-NuMI-CC0pi-Selection/spineplot/myAnalysis/1muNp0pi_Nge1_uncontained/vertex_x'

[analysis]
#ordinate_sample = 'mc'
ordinate_sample = 'onbeam'
category_branch = 'true_category'
category_assignment = [[0,3], [1,4], [6,7,8], [9], [2,5], [10], [-100]]
category_labels = ['Signal', 'Signal QE', 'Other CC', '$\nu$ NC', 'OOFV', 'Cosmic', 'Data']
category_colors = ['darkgreen', 'forestgreen','C1', 'C3','C5', 'C4', 'C6','black']
category_types = ['histogram', 'histogram', 'histogram', 'histogram','histogram','histogram', 'scatter']

[[systematic_recipe]]
name = 'stats'
label = 'MC Statistical Uncertainty'
pattern = 'mc_statistical'

[[figure]]
name = 'vertex_x_reco'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra1D'
variable = 'reco_vtx_x'
draw_kwargs = {'show_component_number' = true, 'show_component_percentage' = true, 'invert_stack_order' = true, 'normalize' = true, 'draw_error' = 'stats', 'draw_ratio'='True'}

[[figure]]
name = 'vertex_x_fractional_residual'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra2D'
yvariable = 'reco_vtx_x_residual'
xvariable = 'true_vtx_x_residual'
xrange = [-2,2]
xtitle = '$\frac{x_{\mathrm{reco}} - x_{\mathrm{true}}}{x_{\mathrm{true}}}$'
draw_kwargs = {'show_option' = 'projection', 'draw_identity' = true, 'draw_colorbar' = true, 'logz' = true}

[[figure]]
name = 'vertex_x_2d_correlation'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra2D'
xvariable = 'true_vtx_x'
yvariable = 'reco_vtx_x'
draw_kwargs = {'show_option' = '2d', 'draw_identity' = true, 'draw_colorbar' = true, 'logz' = true}

[[figure]]
name = 'vertex_x_smearing_matrix_normalized'
type = 'SimpleFigure'
style = 'selected_icarus_1muNp0pi_N>=1'
[[figure.artists]]
type = 'SpineSpectra2D'
xvariable = 'true_vtx_x_smearing'
yvariable = 'reco_vtx_x_smearing'
draw_kwargs = {show_option = 'smearing', draw_colorbar = true}